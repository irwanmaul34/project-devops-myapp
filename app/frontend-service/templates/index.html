<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 450px;
            background: #111827;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .ok {
            background-color: #16a34a;
            color: white;
        }

        .down {
            background-color: #dc2626;
            color: white;
        }

        .data {
            background: #1f2937;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #374151;
        }

        .row {
            margin-bottom: 10px;
        }

        .label {
            font-weight: bold;
            color: #93c5fd;
        }

        .value {
            color: #f8fafc;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>🚀 Microservice Dashboard</h1>

    {% if status == "OK" %}
        <div class="status ok">
            API SERVICE UP
        </div>
    {% else %}
        <div class="status down">
            API SERVICE DOWN
        </div>
    {% endif %}

    <div class="data">

        <div class="row">
            <span class="label">Service:</span>
            <span class="value">
                {{ data.get('service', '-') }}
            </span>
        </div>

        <div class="row">
            <span class="label">Hostname:</span>
            <span class="value">
                {{ data.get('hostname', '-') }}
            </span>
        </div>

        <div class="row">
            <span class="label">Value:</span>
            <span class="value">
                {{ data.get('value', '-') }}
            </span>
        </div>

    </div>

</div>

</body>
</html>
